<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Thông tin chứng chỉ hiệu chuẩn</title>

<style>
    body {
        font-family: Arial;
        max-width: 700px;
        margin: 40px auto;
        padding: 20px;
        line-height: 2;
        text-align: center;
        font-size: 30px;
    }

    .logo {
        width: 220px;
        margin-bottom: 25px;
    }

    h1 {
        font-size: 36px;
        margin-bottom: 10px;
    }

    h2 {
        font-size: 38px;
        font-weight: bold;
        margin-bottom: 25px;
    }

    .info {
        text-align: left;
        margin-top: 30px;
        font-size: 30px;
    }

    .label {
        font-weight: bold;
        font-size: 30px;
    }
</style>
</head>
<body>

<img class="logo" src="https://alvissp.github.io/QR_info/Picture1.png">

<h2 style="font-size:34px;font-weight:bold;">Thông tin chứng chỉ hiệu chuẩn</h2>

<div class="info">
    <div><span class="label">Certificate Number/Số chứng chỉ:</span> <span id="cert"></span></div>
    <div><span class="label">Equipment/Thiết bị:</span> <span id="equip"></span></div>
    <div><span class="label">Manufacturer/Nhà sản xuất:</span> <span id="manu"></span></div>
    <div><span class="label">Serial Number/Serial thiết bị:</span> <span id="serial"></span></div>
    <div><span class="label">Calibration Label/Số tem:</span> <span id="label"></span></div>
    <div><span class="label">Recalibration Recommnended/Ngày hiệu chuẩn khuyến nghị:</span> <span id="exp"></span></div>
</div>

<script>
const params = new URLSearchParams(window.location.search);

document.getElementById("cert").textContent = params.get("cert") || "";
document.getElementById("equip").textContent = params.get("equip") || "";
document.getElementById("manu").textContent = params.get("manu") || "";    
document.getElementById("serial").textContent = params.get("serial") || "";
document.getElementById("label").textContent = params.get("label") || "";
document.getElementById("exp").textContent = params.get("exp") || "";    
</script>

</body>
</html>
