<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Thông tin chứng chỉ hiệu chuẩn</title>

<style>
    body {
        font-family: Arial;
        max-width: 700px;
        margin: 40px auto;
        padding: 20px;
        line-height: 1.8;
        text-align: center;
    }

    .logo {
        width: 180px;
        margin-bottom: 20px;
    }

    .info {
        text-align: left;
        margin-top: 30px;
        font-size: 18px;
    }

    .label {
        font-weight: bold;
    }
</style>
</head>
<body>

<img class="logo" src="https://alvissp.github.io/QR_info/logo.png" alt="HANA NDT Logo">

<h2>Thông tin chứng chỉ hiệu chuẩn</h2>

<div class="info">
    <div><span class="label">Certificate Number:</span> <span id="cert"></span></div>
    <div><span class="label">Serial Number:</span> <span id="serial"></span></div>
    <div><span class="label">Calibration Label:</span> <span id="label"></span></div>
</div>

<script>
const params = new URLSearchParams(window.location.search);

document.getElementById("cert").textContent = params.get("cert") || "";
document.getElementById("serial").textContent = params.get("serial") || "";
document.getElementById("label").textContent = params.get("label") || "";
</script>

</body>
</html>
